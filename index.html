<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <header class="hero">
        <h1>🏠 House Price Predictor</h1>
        <p>Real-time ML predictions powered by Google Cloud Run</p>
        <button onclick="scrollToApp()">Try It Now</button>
    </header>

    <section class="info">
        <div class="card">
            <h2>⚡ Fast API</h2>
            <p>Cloud Run</p>
        </div>
        <div class="card">
            <h2>🧠 ML Model</h2>
            <p>Regression</p>
        </div>
        <div class="card">
            <h2>🌐 Full Stack</h2>
            <p>End-to-End</p>
        </div>
    </section>

    <section id="app" class="app">
        <h2>Adjust Home Features</h2>

        <div id="sliders"></div>

        <button id="predictBtn">Predict Price</button>

        <div id="predictionBox">— no prediction yet —</div>

        <canvas id="chart"></canvas>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const features = [
            { name: "MedInc", min: 0, max: 10, step: 0.1, val: 5 },
            { name: "HouseAge", min: 0, max: 50, step: 1, val: 20 },
            { name: "AveRooms", min: 1, max: 10, step: 0.1, val: 5 },
            { name: "AveBedrms", min: 1, max: 5, step: 0.1, val: 2 },
            { name: "Population", min: 100, max: 5000, step: 50, val: 1500 },
            { name: "AveOccup", min: 1, max: 5, step: 0.1, val: 3 },
            { name: "Latitude", min: 30, max: 45, step: 0.1, val: 34 },
            { name: "Longitude", min: -125, max: -110, step: 0.1, val: -118 }
        ];

        const slidersDiv = document.getElementById("sliders");
        let chart;

        // BUILD SLIDERS
        features.forEach((f, i) => {
            const wrapper = document.createElement("div");

            const label = document.createElement("label");
            label.innerHTML = `${f.name}: <span id="val${i}">${f.val}</span>`;

            const input = document.createElement("input");
            input.type = "range";
            input.min = f.min;
            input.max = f.max;
            input.step = f.step;
            input.value = f.val;

            input.oninput = () => {
                document.getElementById(`val${i}`).textContent = input.value;
            };

            wrapper.appendChild(label);
            wrapper.appendChild(input);
            slidersDiv.appendChild(wrapper);
        });

        // PREDICT
        async function doPredict() {
            const values = Array.from(document.querySelectorAll("input[type=range]"))
                .map(i => Number(i.value));

            const res = await fetch(
                "https://house-api-816554231079.us-central1.run.app/predict",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ values })
                }
            );

            const data = await res.json();
            const price = data.prediction * 100000;

            document.getElementById("predictionBox").textContent =
                `Estimated Price: $${price.toLocaleString()}`;

            updateChart(price);
        }

        document.getElementById("predictBtn").onclick = doPredict;

        // CHART
        function updateChart(price) {
            const ctx = document.getElementById("chart");

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Predicted Price"],
                    datasets: [{
                        label: "USD",
                        data: [price]
                    }]
                }
            });
        }

        function scrollToApp() {
            document.getElementById("app").scrollIntoView({ behavior: "smooth" });
        }
    </script>

</body>

</html>
